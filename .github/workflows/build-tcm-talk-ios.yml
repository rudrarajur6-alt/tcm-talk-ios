name: Build TCM Talk iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: List available iOS simulator runtimes
        run: |
          xcrun simctl list runtimes
          xcodebuild -version

      - name: Download iOS 18.4 simulator (required by Xcode 16.3 default)
        run: |
          xcrun simctl list > /dev/null
          xcodebuild -downloadPlatform iOS -buildVersion 18.4 || true

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: latest

      - name: Pod install
        run: pod install --repo-update

      - name: Build for iOS Simulator (main target only, skip tests)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace NextcloudTalk.xcworkspace \
            -scheme NextcloudTalk \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            build | tee xcodebuild.log | xcpretty || (tail -400 xcodebuild.log && exit 1)

      - name: Package .app for Appetize
        run: |
          mkdir -p out
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/out/tcm-talk-ios.zip" "$(basename "$APP_PATH")"
          ls -la "$GITHUB_WORKSPACE/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: tcm-talk-ios-app
          path: out/tcm-talk-ios.zip
          retention-days: 30

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: ios-debug-${{ github.run_number }}
          name: TCM Talk iOS debug build ${{ github.run_number }}
          files: out/tcm-talk-ios.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
